# Builds the Portero macOS app.
#
# - Push a tag like `v0.1.0` -> builds both architectures and creates a
#   draft GitHub Release with the .dmg / .app bundles attached.
# - Manual run (workflow_dispatch) -> builds and uploads the bundles as
#   workflow artifacts, no release created.
#
# Portero is macOS-only (it shells out to lsof, pfctl, osascript and sips),
# so there are no Windows/Linux jobs.
name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macos-arm64
          - target: x86_64-apple-darwin
            name: macos-x86_64
    runs-on: macos-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          # On tag pushes, create a draft release with the bundles attached.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Portero {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: portero-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: error
